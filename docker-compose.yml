# ─────────────────────────────────────────────────────────────────────────────
# WMS-2026 — Docker Compose
# Deploy: git clone <repo> && cd wms && docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  wms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:wmspassword@wms-db:3306/wms_2026
      - NODE_ENV=production
      # AUTH_SECRET wajib diisi — generate: openssl rand -base64 32
      - AUTH_SECRET=wms2026-default-secret-changeme
      # AUTH_TRUST_HOST=1 → izinkan akses via IP/domain apapun tanpa HTTPS
      - AUTH_TRUST_HOST=1
    depends_on:
      wms-db:
        condition: service_healthy

  wms-db:
    image: mysql:8.0
    container_name: wms-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=wmspassword
      - MYSQL_DATABASE=wms_2026
    volumes:
      - wms_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pwmspassword"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  wms_db_data:
    driver: local
